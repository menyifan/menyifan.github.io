<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}Yifan Men</title>
    <meta name="description" content="{{ page.description | default: 'Personal homepage of Yifan Men' }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}">
    <link rel="icon" type="image/png" href="{{ '/chery_logo.png' | relative_url }}">
  </head>
  <body>
    <aside class="sidebar">
      <a class="site-brand" href="{{ '/' | relative_url }}" aria-label="Yifan Men home">
        <span class="brand-mark">YM</span>
        <span class="brand-copy"><strong>Yifan Men</strong><small>Active Safety · ADAS</small></span>
      </a>
      <nav class="sidebar-nav">
        <a {% if page.url == '/' or page.url == '/index.html' %}class="active"{% endif %} href="{{ '/' | relative_url }}"><span>01</span>Home</a>
        <a {% if page.url contains 'experience' %}class="active"{% endif %} href="{{ '/experience' | relative_url }}"><span>02</span>Experiences</a>
        <a {% if page.url contains 'publications' %}class="active"{% endif %} href="{{ '/publications' | relative_url }}"><span>03</span>Publications</a>
      </nav>
      <div class="sidebar-footer">
        <span class="status-dot"></span> Shanghai, China
      </div>
    </aside>

    <main class="page">
      {{ content }}
      <footer class="page-footer">© {{ 'now' | date: "%Y" }} Yifan Men · Engineering safer mobility</footer>
    </main>
  </body>
</html>
